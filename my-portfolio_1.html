<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>My Portfolio</title>
<style>
  :root {
    --bg:#0d0f14;--bg2:#141720;--bg3:#1c2030;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.13);
    --text:#f0f2f7;--text2:#8b91a8;--text3:#545a72;
    --up:#22c87a;--up-bg:rgba(34,200,122,0.1);
    --down:#f05252;--down-bg:rgba(240,82,82,0.1);
    --accent:#6c7fff;--accent-bg:rgba(108,127,255,0.12);
    --gold:#f5a623;--gold-bg:rgba(245,166,35,0.12);
    --radius:14px;--radius-sm:9px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,'SF Pro Text','Segoe UI',sans-serif;min-height:100vh;padding-bottom:40px}

  .header{padding:20px 18px 14px;border-bottom:1px solid var(--border)}
  .header-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
  .header h1{font-size:20px;font-weight:700;letter-spacing:-0.4px}
  .refresh-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer}
  .last-update{font-size:11px;color:var(--text3)}

  .summary{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:14px 18px}
  .sum-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:12px 14px}
  .sum-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:5px}
  .sum-val{font-size:20px;font-weight:700;letter-spacing:-0.5px}
  .sum-val.up{color:var(--up)}.sum-val.down{color:var(--down)}
  .sum-card.mc{background:var(--down-bg);border-color:rgba(240,82,82,0.2)}
  .sum-card.mc .sum-label{color:rgba(240,82,82,0.6)}
  .sum-card.mc .sum-val{color:var(--down)}

  .alert-bar{margin:0 18px 14px;background:var(--down-bg);border:1px solid rgba(240,82,82,0.25);border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;color:var(--down)}

  .tabs{display:flex;padding:0 18px;gap:6px;margin-bottom:14px}
  .tab{font-size:13px;font-weight:500;padding:7px 16px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;color:var(--text2);background:transparent}
  .tab.active{background:var(--accent);border-color:var(--accent);color:#fff}

  .stock-list{padding:0 18px;display:flex;flex-direction:column;gap:10px}
  .stock-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
  .stock-card.held{border-color:rgba(108,127,255,0.3)}

  .card-top{display:flex;align-items:flex-start;justify-content:space-between;padding:13px 14px 10px}
  .card-sym{font-size:16px;font-weight:700;color:var(--text)}
  .held-badge{display:inline-block;font-size:9px;font-weight:600;background:var(--accent-bg);color:var(--accent);padding:2px 7px;border-radius:20px;margin-left:5px;vertical-align:middle}
  .card-name{font-size:11px;color:var(--text3);margin-top:2px}
  .price-block{text-align:right}
  .market-label{font-size:9px;font-weight:600;letter-spacing:0.5px;padding:2px 7px;border-radius:20px;margin-bottom:4px;display:inline-block}
  .ml-open{background:var(--up-bg);color:var(--up)}
  .ml-pre{background:var(--gold-bg);color:var(--gold)}
  .ml-post{background:var(--accent-bg);color:var(--accent)}
  .ml-closed{background:var(--bg3);color:var(--text3)}
  .card-price{font-size:18px;font-weight:700;color:var(--text)}
  .card-chg{font-size:12px;font-weight:500;margin-top:2px}
  .card-chg.up{color:var(--up)}.card-chg.down{color:var(--down)}

  .ext-row{border-top:1px solid var(--border);padding:7px 14px;display:flex;align-items:center;justify-content:space-between}
  .ext-label{font-size:10px;color:var(--text3)}
  .ext-right{text-align:right}
  .ext-price{font-size:13px;font-weight:600}
  .ext-chg{font-size:11px;margin-top:1px}
  .ext-price.up,.ext-chg.up{color:var(--up)}
  .ext-price.down,.ext-chg.down{color:var(--down)}

  .holdings-row{border-top:1px solid var(--border);padding:9px 14px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .h-item{text-align:center}
  .h-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
  .h-val{font-size:13px;font-weight:600;color:var(--text)}
  .h-val.up{color:var(--up)}.h-val.down{color:var(--down)}

  /* News button row — now shows AI summary preview */
  .card-footer{border-top:1px solid var(--border);padding:10px 14px}
  .footer-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:0}
  .range-text{font-size:10px;color:var(--text3)}
  .news-btn{font-size:12px;font-weight:500;padding:6px 13px;border-radius:20px;border:1px solid var(--border2);cursor:pointer;background:transparent;color:var(--text2);display:flex;align-items:center;gap:5px;flex-shrink:0}
  .news-btn.has-news{background:var(--accent-bg);border-color:rgba(108,127,255,0.4);color:var(--accent)}
  .news-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);flex-shrink:0;animation:pulse 1.5s infinite}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}

  /* AI summary pill — shown directly on card */
  .ai-pill{margin-top:9px;padding:9px 11px;background:var(--bg3);border-radius:var(--radius-sm);border:1px solid var(--border)}
  .ai-pill-hdr{display:flex;align-items:center;gap:7px;margin-bottom:6px}
  .ai-mini-badge{font-size:9px;font-weight:600;background:var(--accent-bg);color:var(--accent);padding:2px 7px;border-radius:20px;letter-spacing:0.3px}
  .sent-sm{font-size:10px;font-weight:600;padding:2px 8px;border-radius:20px}
  .s-bull{background:var(--up-bg);color:var(--up)}
  .s-bear{background:var(--down-bg);color:var(--down)}
  .s-neu{background:var(--gold-bg);color:var(--gold)}
  .ai-pill-zh{font-size:12px;color:var(--text2);line-height:1.65;margin-bottom:5px}
  .ai-pill-en{font-size:11px;color:var(--text3);line-height:1.55}
  .ai-pill-analyzing{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text3);padding:2px 0}

  /* Spinner */
  .spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
  .sm-spin{width:11px;height:11px;border:1.5px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;flex-shrink:0}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:32px;text-align:center;color:var(--text3);font-size:13px}
  .error-card{background:var(--down-bg);border:1px solid rgba(240,82,82,0.2);border-radius:var(--radius);padding:20px 18px;font-size:13px;color:var(--down);line-height:1.6}
  .error-card b{display:block;font-size:14px;margin-bottom:6px}
  .retry-btn{margin-top:12px;font-size:13px;padding:8px 18px;border-radius:20px;border:1px solid rgba(240,82,82,0.4);background:transparent;color:var(--down);cursor:pointer}

  /* Modal */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.75);z-index:200;display:none;align-items:flex-end}
  .modal-overlay.open{display:flex}
  .modal-sheet{background:var(--bg2);border-radius:22px 22px 0 0;width:100%;max-height:88vh;overflow-y:auto}
  .modal-handle{width:36px;height:4px;background:var(--border2);border-radius:2px;margin:12px auto 0}
  .modal-hdr{padding:14px 18px 12px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;position:sticky;top:0;background:var(--bg2);z-index:1}
  .modal-sym{font-size:18px;font-weight:700}
  .modal-sub{font-size:12px;color:var(--text2);margin-top:3px}
  .modal-close{font-size:20px;color:var(--text3);background:var(--bg3);border:none;width:30px;height:30px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .modal-body{padding:16px 18px 30px}

  /* Full AI card in modal */
  .ai-full{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:16px}
  .ai-full-hdr{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap}
  .ai-badge{font-size:10px;font-weight:600;background:var(--accent-bg);color:var(--accent);padding:3px 9px;border-radius:20px}
  .sent-badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:20px}
  .ai-en{font-size:14px;line-height:1.65;color:var(--text);margin-bottom:10px}
  .ai-divider{height:1px;background:var(--border);margin:10px 0}
  .ai-zh-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:6px}
  .ai-zh{font-size:14px;line-height:1.75;color:var(--text)}

  .news-sec-label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px}
  .ni{padding:12px 14px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:8px;cursor:pointer;text-decoration:none;display:block}
  .ni:active{opacity:0.7}
  .ni-title{font-size:13px;line-height:1.45;color:var(--text);margin-bottom:5px}
  .ni-meta{font-size:11px;color:var(--text3)}
  .no-news{text-align:center;padding:32px 0;color:var(--text3);font-size:14px}

  /* Strategy */
  .strat-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:10px;overflow:hidden}
  .strat-hdr{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer}
  .strat-sym{font-size:14px;font-weight:600;color:var(--text)}
  .strat-cname{font-size:11px;color:var(--text3);margin-top:2px}
  .strat-arrow{font-size:18px;color:var(--text3);transition:transform 0.2s;line-height:1}
  .strat-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
  .strat-body textarea{width:100%;margin-top:12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-size:13px;font-family:inherit;padding:10px 12px;resize:vertical;min-height:90px;line-height:1.55}
  .strat-body textarea:focus{outline:none;border-color:var(--accent)}
  .strat-body textarea::placeholder{color:var(--text3)}
  .save-row{display:flex;align-items:center;gap:10px;margin-top:8px}
  .save-btn{font-size:12px;padding:7px 16px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);cursor:pointer}
  .saved-ok{font-size:12px;color:var(--up);display:none}
  .section{padding:0 18px}
</style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>📊 My Portfolio</h1>
    <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
  </div>
  <div class="last-update" id="ts">Updating...</div>
</div>

<div class="summary">
  <div class="sum-card"><div class="sum-label">Portfolio value</div><div class="sum-val" id="s-val">—</div></div>
  <div class="sum-card"><div class="sum-label">Total P&amp;L</div><div class="sum-val" id="s-pnl">—</div></div>
  <div class="sum-card mc"><div class="sum-label">⚠ Margin debt</div><div class="sum-val down">-$3,367.81</div></div>
  <div class="sum-card"><div class="sum-label">Net position</div><div class="sum-val" id="s-net">—</div></div>
</div>

<div class="alert-bar">⚠ 账户目前亏损中 · Margin: -$3,367.81</div>

<div class="tabs">
  <button class="tab active" onclick="sw('watchlist',this)">Watchlist</button>
  <button class="tab" onclick="sw('strategy',this)">My Strategy</button>
</div>

<div id="tab-watchlist">
  <div class="stock-list" id="stock-list">
    <div class="loading-card"><div class="spinner"></div>Loading prices...</div>
  </div>
</div>
<div id="tab-strategy" style="display:none">
  <div class="section" id="strat-sec"></div>
</div>

<!-- Bottom sheet modal -->
<div class="modal-overlay" id="overlay" onclick="closeOverlay(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-hdr">
      <div>
        <div class="modal-sym" id="m-sym"></div>
        <div class="modal-sub" id="m-sub"></div>
      </div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body" id="m-body"></div>
  </div>
</div>

<script>
const TICKERS=[
  {sym:'TEM', name:'Tempus AI',     shares:48,  avg:63.34},
  {sym:'PLTR',name:'Palantir',      shares:0,   avg:0},
  {sym:'RBLX',name:'Roblox',        shares:110, avg:75.33},
  {sym:'TSLA',name:'Tesla',         shares:0,   avg:0},
  {sym:'NVDA',name:'Nvidia',        shares:0,   avg:0},
  {sym:'AVAV',name:'AeroVironment', shares:0,   avg:0},
  {sym:'SNDK',name:'SanDisk',       shares:0,   avg:0},
  {sym:'MU',  name:'Micron',        shares:0,   avg:0},
  {sym:'VRT', name:'Vertiv',        shares:0,   avg:0},
  {sym:'IREN',name:'IREN',          shares:0,   avg:0},
  {sym:'SPCX',name:'SpaceX',        shares:0,   avg:0},
];
const MARGIN=3367.81;
const SK='pvs_strats_v7';

function lS(){try{return JSON.parse(localStorage.getItem(SK))||{};}catch(e){return{};}}
function sS(sym,v){const d=lS();d[sym]=v;localStorage.setItem(SK,JSON.stringify(d));}

let pCache={}, nCache={}, aiCache={};

async function proxyFetch(url){
  const proxies=[
    `https://corsproxy.io/?${encodeURIComponent(url)}`,
    `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`,
    `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(url)}`,
  ];
  for(const p of proxies){
    try{
      const r=await fetch(p,{signal:AbortSignal.timeout(9000)});
      if(!r.ok)continue;
      let t=await r.text();
      if(t.includes('"contents"'))t=JSON.parse(t).contents;
      return t;
    }catch(e){continue;}
  }
  throw new Error('All proxies failed');
}

async function fetchQ(sym){
  const url=`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${sym}&fields=regularMarketPrice,regularMarketChange,regularMarketChangePercent,regularMarketPreviousClose,fiftyTwoWeekHigh,fiftyTwoWeekLow,preMarketPrice,preMarketChange,preMarketChangePercent,postMarketPrice,postMarketChange,postMarketChangePercent,marketState`;
  const text=await proxyFetch(url);
  const q=JSON.parse(text).quoteResponse?.result?.[0];
  if(!q)throw new Error('No quote data');
  return{
    price:q.regularMarketPrice, change:q.regularMarketChange, changePct:q.regularMarketChangePercent,
    prev:q.regularMarketPreviousClose, h52:q.fiftyTwoWeekHigh, l52:q.fiftyTwoWeekLow,
    prePrice:q.preMarketPrice||null, preChange:q.preMarketChange||null, preChangePct:q.preMarketChangePercent||null,
    postPrice:q.postMarketPrice||null, postChange:q.postMarketChange||null, postChangePct:q.postMarketChangePercent||null,
    marketState:q.marketState||'CLOSED',
  };
}

async function fetchN(sym){
  const url=`https://query1.finance.yahoo.com/v1/finance/search?q=${sym}&newsCount=6&quotesCount=0`;
  try{
    const text=await proxyFetch(url);
    const p=JSON.parse(text);
    return(p.news||[]).slice(0,6).map(n=>({title:n.title,publisher:n.publisher,time:n.providerPublishTime,link:n.link}));
  }catch(e){return[];}
}

// AI analysis — called in background, result stored in aiCache
async function analyzeNews(sym, news, q){
  if(!news||news.length===0){aiCache[sym]={err:true};updateAIPill(sym);return;}
  const headlines=news.map((n,i)=>`${i+1}. ${n.title} (${n.publisher})`).join('\n');
  const priceCtx=q?`Price: $${q.price.toFixed(2)}, today ${q.change>=0?'+':''}${q.changePct.toFixed(2)}%, state: ${q.marketState}`:'';
  const t=TICKERS.find(x=>x.sym===sym);
  try{
    const resp=await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:800,
        messages:[{role:'user',content:`You are helping a Malaysian retail investor. Analyze these headlines for ${sym} (${t.name}).
${priceCtx}
Headlines:
${headlines}

Reply ONLY in this exact JSON (no markdown, no extra text):
{
  "sentiment": "bullish" or "bearish" or "neutral",
  "zh": "用1-2句超级简单的中文说人话。好消息还是坏消息？最重要的一点是什么？",
  "en": "1-2 sentences. Plain English. Good or bad? Key takeaway?"
}`}]
      })
    });
    const data=await resp.json();
    const txt=data.content.map(c=>c.text||'').join('');
    const parsed=JSON.parse(txt.replace(/```json|```/g,'').trim());
    aiCache[sym]=parsed;
  }catch(e){
    aiCache[sym]={err:true};
  }
  updateAIPill(sym);
}

function updateAIPill(sym){
  const el=document.getElementById('ai-pill-'+sym);
  if(!el)return;
  const ai=aiCache[sym];
  if(!ai||ai.err){
    el.innerHTML='<span style="font-size:11px;color:var(--text3)">AI analysis unavailable</span>';
    return;
  }
  const sc=ai.sentiment==='bullish'?'s-bull':ai.sentiment==='bearish'?'s-bear':'s-neu';
  const sl=ai.sentiment==='bullish'?'📈 利好':'📉 利空';
  const slen=ai.sentiment==='neutral'?'➡️ 中性':sl;
  el.innerHTML=`
    <div class="ai-pill-hdr">
      <span class="ai-mini-badge">✦ AI</span>
      <span class="sent-sm ${sc}">${slen}</span>
    </div>
    <div class="ai-pill-zh">${ai.zh}</div>
    <div class="ai-pill-en">${ai.en}</div>`;
}

function f(n,d=2){return n==null||isNaN(n)?null:'$'+Math.abs(n).toFixed(d);}
function fp(n){if(n==null||isNaN(n))return'—';return(n>=0?'+':'-')+'$'+Math.abs(n).toFixed(2);}
function fpct(n){return n==null||isNaN(n)?'':((n>=0?'+':'')+n.toFixed(2)+'%');}
function ta(ts){const m=Math.floor((Date.now()/1000-ts)/60);if(m<60)return m+'m ago';if(m<1440)return Math.floor(m/60)+'h ago';return Math.floor(m/1440)+'d ago';}
function mlInfo(s){
  if(s==='REGULAR')return['🟢 OPEN','ml-open'];
  if(s==='PRE')    return['🌅 PRE-MARKET','ml-pre'];
  if(s==='POST')   return['🌙 AFTER-HOURS','ml-post'];
  return['⏸ CLOSED','ml-closed'];
}

async function loadAll(){
  document.getElementById('ts').textContent='Updating...';
  document.getElementById('stock-list').innerHTML='<div class="loading-card"><div class="spinner"></div>Loading prices...</div>';
  aiCache={};

  const[qR,nR]=await Promise.all([
    Promise.allSettled(TICKERS.map(t=>fetchQ(t.sym))),
    Promise.allSettled(TICKERS.map(t=>fetchN(t.sym)))
  ]);
  nR.forEach((r,i)=>{if(r.status==='fulfilled')nCache[TICKERS[i].sym]=r.value;});

  let totVal=0,totPnl=0,loaded=0,html='';

  qR.forEach((r,i)=>{
    const t=TICKERS[i];
    if(r.status==='fulfilled'){
      const q=r.value;pCache[t.sym]=q;loaded++;
      const held=t.shares>0;
      const mv=held?q.price*t.shares:null;
      const pnl=held?(q.price-t.avg)*t.shares:null;
      if(held){totVal+=mv;totPnl+=pnl;}
      const news=nCache[t.sym]||[];
      const hasN=news.length>0;
      const cc=q.change>=0?'up':'down';
      const[sl,sc]=mlInfo(q.marketState);

      let extHtml='';
      if(q.marketState==='PRE'&&q.prePrice){
        const ec=q.preChange>=0?'up':'down';
        extHtml=`<div class="ext-row"><div class="ext-label">🌅 Pre-market</div><div class="ext-right"><div class="ext-price ${ec}">${f(q.prePrice)}</div><div class="ext-chg ${ec}">${fp(q.preChange)} (${fpct(q.preChangePct)})</div></div></div>`;
      }else if((q.marketState==='POST'||q.marketState==='CLOSED')&&q.postPrice){
        const ec=q.postChange>=0?'up':'down';
        extHtml=`<div class="ext-row"><div class="ext-label">🌙 After-hours</div><div class="ext-right"><div class="ext-price ${ec}">${f(q.postPrice)}</div><div class="ext-chg ${ec}">${fp(q.postChange)} (${fpct(q.postChangePct)})</div></div></div>`;
      }

      // AI pill — shows "analyzing" spinner while waiting
      const aiPillContent=hasN
        ?`<div class="ai-pill-analyzing"><div class="sm-spin"></div>AI analyzing...</div>`
        :`<span style="font-size:11px;color:var(--text3)">No news available</span>`;

      html+=`<div class="stock-card${held?' held':''}">
        <div class="card-top">
          <div>
            <div class="card-sym">${t.sym}${held?'<span class="held-badge">持有</span>':''}</div>
            <div class="card-name">${t.name}</div>
          </div>
          <div class="price-block">
            <div><span class="market-label ${sc}">${sl}</span></div>
            <div class="card-price">${f(q.price)||'—'}</div>
            <div class="card-chg ${cc}">${fpct(q.changePct)} (${fp(q.change)})</div>
          </div>
        </div>
        ${extHtml}
        ${held?`<div class="holdings-row">
          <div class="h-item"><div class="h-label">Avg cost</div><div class="h-val">${f(t.avg)}</div></div>
          <div class="h-item"><div class="h-label">Mkt value</div><div class="h-val">${f(mv)}</div></div>
          <div class="h-item"><div class="h-label">P&L</div><div class="h-val ${pnl>=0?'up':'down'}">${fp(pnl)}</div></div>
        </div>`:''}
        <div class="card-footer">
          <div class="footer-top">
            <div class="range-text">52w ${f(q.l52)||'—'} – ${f(q.h52)||'—'}</div>
            <button class="news-btn${hasN?' has-news':''}" onclick="openNews('${t.sym}')">
              ${hasN?'<span class="news-dot"></span>':''}📰 News${hasN?' ('+news.length+')':''}
            </button>
          </div>
          <div class="ai-pill" id="ai-pill-${t.sym}">${aiPillContent}</div>
        </div>
      </div>`;
    }else{
      html+=`<div class="stock-card"><div class="card-top"><div><div class="card-sym">${t.sym}</div><div class="card-name">${t.name}</div></div><div style="font-size:11px;color:var(--text3)">Unable to load</div></div></div>`;
    }
  });

  if(loaded===0){
    document.getElementById('stock-list').innerHTML=`<div class="error-card"><b>⚠ No data loaded</b>Data sources temporarily unavailable.<button class="retry-btn" onclick="loadAll()">↻ Try again</button></div>`;
    document.getElementById('ts').textContent='Failed — try again';
    renderStrat();return;
  }

  document.getElementById('stock-list').innerHTML=html;

  const net=totVal-MARGIN;
  document.getElementById('s-val').textContent=totVal?'$'+totVal.toFixed(2):'—';
  const sp=document.getElementById('s-pnl');
  sp.className='sum-val '+(totPnl>=0?'up':'down');
  sp.textContent=totVal?fp(totPnl):'—';
  const sn=document.getElementById('s-net');
  sn.className='sum-val '+(net>=0?'up':'down');
  sn.textContent=totVal?(net>=0?'$':'-$')+Math.abs(net).toFixed(2):'—';

  document.getElementById('ts').textContent='Updated '+new Date().toLocaleTimeString('en-MY',{hour:'2-digit',minute:'2-digit'});
  renderStrat();

  // Background AI analysis — all tickers in parallel
  TICKERS.forEach(t=>{
    const news=nCache[t.sym]||[];
    const q=pCache[t.sym]||null;
    analyzeNews(t.sym, news, q);
  });
}

async function openNews(sym){
  const t=TICKERS.find(x=>x.sym===sym);
  const news=nCache[sym]||[];
  const q=pCache[sym];
  const ai=aiCache[sym];

  document.getElementById('m-sym').textContent=`${t.sym} · ${t.name}`;
  document.getElementById('m-sub').textContent=q?`Last: ${f(q.price)}  ${q.change>=0?'▲':'▼'}${Math.abs(q.changePct).toFixed(2)}% · ${mlInfo(q.marketState)[0]}`:'';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';

  const body=document.getElementById('m-body');

  // AI full card
  let aiHtml='';
  if(!news.length){
    aiHtml='<div class="no-news">📭 No news found right now</div>';
  }else if(!ai){
    aiHtml=`<div class="ai-full"><div class="ai-full-hdr"><span class="ai-badge">✦ AI Analysis</span></div><div style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)"><div class="sm-spin"></div>Still analyzing...</div></div>`;
  }else if(ai.err){
    aiHtml=`<div class="ai-full"><div class="ai-full-hdr"><span class="ai-badge">✦ AI Analysis</span></div><div style="font-size:13px;color:var(--text3)">AI analysis unavailable.</div></div>`;
  }else{
    const sc=ai.sentiment==='bullish'?'s-bull':ai.sentiment==='bearish'?'s-bear':'s-neu';
    const sl=ai.sentiment==='bullish'?'📈 利好 Bullish':ai.sentiment==='bearish'?'📉 利空 Bearish':'➡️ 中性 Neutral';
    aiHtml=`<div class="ai-full">
      <div class="ai-full-hdr"><span class="ai-badge">✦ AI Analysis</span><span class="sent-badge ${sc}">${sl}</span></div>
      <div class="ai-zh">${ai.zh}</div>
      <div class="ai-divider"></div>
      <div class="ai-zh-label">English</div>
      <div class="ai-en">${ai.en}</div>
    </div>`;
  }

  body.innerHTML=`${aiHtml}
    ${news.length?`<div class="news-sec-label">Latest headlines</div>
    ${news.map(n=>`<a class="ni" href="${n.link}" target="_blank" rel="noopener">
      <div class="ni-title">${n.title}</div>
      <div class="ni-meta">${n.publisher} · ${ta(n.time)}</div>
    </a>`).join('')}`:''}`;
}

function closeOverlay(e){if(e.target===document.getElementById('overlay'))closeModal();}
function closeModal(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}

function renderStrat(){
  const strats=lS();
  document.getElementById('strat-sec').innerHTML=TICKERS.map(t=>{
    const val=strats[t.sym]||'';
    return`<div class="strat-card">
      <div class="strat-hdr" onclick="togS('sb-${t.sym}',this)">
        <div><div class="strat-sym">${t.sym}</div><div class="strat-cname">${t.name}</div></div>
        <div class="strat-arrow">›</div>
      </div>
      <div class="strat-body" id="sb-${t.sym}">
        <textarea id="ta-${t.sym}" placeholder="写下你对 ${t.sym} 的策略、目标价、进出场计划...">${val}</textarea>
        <div class="save-row">
          <button class="save-btn" onclick="doSv('${t.sym}')">💾 Save</button>
          <span class="saved-ok" id="ok-${t.sym}">✓ Saved!</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function togS(id,btn){
  const el=document.getElementById(id);
  const open=el.style.display!=='block';
  el.style.display=open?'block':'none';
  btn.querySelector('.strat-arrow').style.transform=open?'rotate(90deg)':'';
}
function doSv(sym){
  sS(sym,document.getElementById('ta-'+sym).value);
  const ok=document.getElementById('ok-'+sym);
  ok.style.display='inline';
  setTimeout(()=>ok.style.display='none',2000);
}
function sw(tab,btn){
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  ['watchlist','strategy'].forEach(t=>document.getElementById('tab-'+t).style.display=t===tab?'':'none');
}

loadAll();
setInterval(loadAll,3*60*1000);
</script>
</body>
</html>
